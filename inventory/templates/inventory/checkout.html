{% extends "inventory/base.html" %}

{% block title %}إتمام سداد العربون{% endblock %}

{% block content %}
<!-- 1. استدعاء مكتبات ميسر الرسمية بالتوافق مع المتصفحات الحديثة -->
<link rel="stylesheet" href="https://cdn.moyasar.com/mpf/1.14.0/moyasar.css" />
<script src="https://cdn.moyasar.com/mpf/1.14.0/moyasar.js"></script>

<div class="container my-5 text-end" dir="rtl">
    <div class="row justify-content-center">
        <div class="col-md-7">
            <div class="card shadow-lg border-0 rounded-4 p-4 bg-white">
                
                <h3 class="fw-bold text-center mb-3 text-dark">
                    <i class="fas fa-credit-card text-success me-2"></i> سداد عربون الحجز
                </h3>
                <p class="text-muted text-center mb-4">أدخل معلومات البطاقة البنكية لإتمام حجز السيارة</p>

                <!-- تفاصيل الحجز -->
                <div class="alert alert-light border rounded-3 mb-4 p-3">
                    <div class="d-flex justify-content-between align-items-center mb-2">
                        <strong class="text-dark fs-5">{{ car.brand }} {{ car.model_name }}</strong>
                        <span class="fs-5 fw-bold text-success">{{ booking.amount_paid }} ريال</span>
                    </div>
                </div>

                <!-- حاوية إظهار الأخطاء الفورية للـ JavaScript إن وجدت -->
                <div id="moyasar-debug-error" class="alert alert-danger d-none my-2"></div>

                <!-- 2. الحاوية الرسمية لنموذج ميسر -->
                <div class="mysr-form"></div>

            </div>
        </div>
    </div>
</div>

<!-- 3. سكربت تشغيل بوابة ميسر وعزل التبويبات الجديدة نهائياً -->
<script>
    // خط الدفاع الأول: إغلاق وتوجيه أي محاولة استدعاء لفتح نافذة جديدة بالكامل
    window.open = function (url, target, features) {
        window.location.href = url;
        return window;
    };

    document.addEventListener("DOMContentLoaded", function () {
        const errorDiv = document.getElementById('moyasar-debug-error');
        var currentHost = window.location.origin; 
        var callbackUrl = currentHost + "{% url 'inventory:payment_callback' %}";

        try {
            if (typeof Moyasar === 'undefined') {
                throw new Error("لم يتم تحميل مكتبة ميسر بنجاح.");
            }

            Moyasar.init({
                element: '.mysr-form',
                amount: {{ amount_in_halalas|default:100000 }},
                currency: 'SAR',
                description: 'حجز سيارة رقم {{ booking.id }}',
                publishable_api_key: '{{ moyasar_publishable_key }}',
                callback_url: callbackUrl,
                methods: ['creditcard', 'mada'],
                
                // خط الدفاع الثاني: القبض على رابط المعاملة البنكية وتوجيهه فوراً في نفس الصفحة العليا قبل تدخل المتصفح
                on_completed: function (payment) {
                    if (payment.source && payment.source.transaction_url) {
                        console.log("إعادة توجيه صريحة للبنك في نفس التبويب...");
                        window.top.location.href = payment.source.transaction_url;
                        return false; // يمنع السلوك الافتراضي لمكتبة ميسر لعدم إنشاء التبويب الجديد
                    }
                    return true;
                }
            });

            // خط الدفاع الثالث: فحص ومراقبة مستمرة وسريعة للـ DOM لتغيير أي target خارجي قد يظهر ديناميكياً
            setInterval(function() {
                const elements = document.querySelectorAll('.mysr-form form, .mysr-form a, .mysr-form button');
                elements.forEach(function(el) {
                    if (el.getAttribute('target') !== '_self') {
                        el.setAttribute('target', '_self');
                    }
                });
            }, 100); // يفحص كل 100 مللي ثانية للتأكد من القضاء على أي ثغرة تبويب بشكل فوري

        } catch (error) {
            console.error("❌ خطأ ميسر:", error.message);
            errorDiv.classList.remove('d-none');
            errorDiv.innerHTML = "<strong>تنبيه النظام:</strong> " + error.message;
        }
    });
</script>
{% endblock %}
