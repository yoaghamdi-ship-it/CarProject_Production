{% extends "inventory/base.html" %}

{% block title %}إتمام سداد العربون{% endblock %}

{% block content %}
<!-- 1. استدعاء مكتبات ميسر الرسمية بالتوافق مع المتصفحات الحديثة -->
<link rel="stylesheet" href="https://cdn.moyasar.com/mpf/1.14.0/moyasar.css" />
<script src="https://polyfill.io/v3/polyfill.min.js?features=fetch"></script>
<script src="https://cdn.moyasar.com/mpf/1.14.0/moyasar.js"></script>

<div class="container my-5 text-end" dir="rtl">
    <div class="row justify-content-center">
        <div class="col-md-7">
            <div class="card shadow-lg border-0 rounded-4 p-4 bg-white">
                
                <h3 class="fw-bold text-center mb-3 text-dark">
                    <i class="fas fa-credit-card text-success me-2"></i> سداد عربون الحجز
                </h3>
                <p class="text-muted text-center mb-4">أدخل معلومات البطاقة البنكية لإتمام حجز السيارة</p>

                <!-- تفاصيل الحجز -->
                <div class="alert alert-light border rounded-3 mb-4 p-3">
                    <div class="d-flex justify-content-between align-items-center mb-2">
                        <strong class="text-dark fs-5">{{ car.brand }} {{ car.model_name }}</strong>
                        <span class="fs-5 fw-bold text-success">{{ booking.amount_paid }} ريال</span>
                    </div>
                </div>

                <!-- حاوية إظهار الأخطاء الفورية للـ JavaScript إن وجدت -->
                <div id="moyasar-debug-error" class="alert alert-danger d-none my-2"></div>

                <!-- 2. الحاوية الرسمية لنموذج ميسر (يجب استخدام class بالتوافق مع مكتبة Moyasar) -->
                <div class="mysr-form"></div>

            </div>
        </div>
    </div>
</div>

<!-- 3. سكربت تشغيل بوابة ميسر البيئي والآمن -->
<script>
    // 🛠️ حيلة إجبارية: إعادة توجيه دالة window.open لتفتح في نفس الصفحة بدلاً من تبويب جديد
    window.open = function (url, target, features) {
        window.location.href = url;
        return window;
    };

    document.addEventListener("DOMContentLoaded", function () {
        const errorDiv = document.getElementById('moyasar-debug-error');
        
        var currentHost = window.location.origin; 
        var callbackUrl = currentHost + "{% url 'inventory:payment_callback' %}";
        
        console.log("=== Moyasar Debugging ===");
        console.log("Amount in halalas:", {{ amount_in_halalas|default:100000 }});
        console.log("Publishable Key Exists:", "{{ moyasar_publishable_key }}" ? "Yes" : "No");
        console.log("Callback URL configured:", callbackUrl);

        try {
            if (typeof Moyasar === 'undefined') {
                throw new Error("لم يتم تحميل مكتبة ميسر من خوادمها بنجاح.");
            }

            // تشغيل نموذج ميسر التفاعلي
            Moyasar.init({
                element: '.mysr-form',
                amount: {{ amount_in_halalas|default:100000 }},
                currency: 'SAR',
                description: 'حجز سيارة رقم {{ booking.id }} - {{ request.user.username }}',
                publishable_api_key: '{{ moyasar_publishable_key }}',
                callback_url: callbackUrl,
                methods: ['creditcard', 'stcpay']
            });
            console.log("✅ تم تشغيل وربط ميسر بالواجهة بنجاح!");
            
            // احتياطاً: تتبع أي عناصر نموذج ديناميكية وتعديل الـ target
            const targetNode = document.querySelector('.mysr-form');
            if (targetNode) {
                const observer = new MutationObserver(function(mutations) {
                    mutations.forEach(function(mutation) {
                        const forms = targetNode.querySelectorAll('form');
                        forms.forEach(function(form) {
                            if (form.getAttribute('target') === '_blank') {
                                form.setAttribute('target', '_self');
                                console.log("🛠️ تم تعديل target النموذج إلى _self");
                            }
                        });
                    });
                });
                observer.observe(targetNode, { childList: true, subtree: true });
            }
            
        } catch (error) {
            console.error("❌ فشل في تشغيل ميسر:", error.message);
            errorDiv.classList.remove('d-none');
            errorDiv.innerHTML = "<strong>تنبيه النظام:</strong> " + error.message;
        }
    });
</script>
{% endblock %}
