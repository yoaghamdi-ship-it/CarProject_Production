<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل الدخول - CarProject</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.rtl.min.css">
    <style>
        /* إضافة لمسة جمالية للحقول */
        input {
            display: block;
            width: 100%;
            padding: 0.375rem 0.75rem;
            font-size: 1rem;
            font-weight: 400;
            line-height: 1.5;
            color: #212529;
            background-color: #fff;
            border: 1px solid #ced4da;
            border-radius: 0.375rem;
            transition: border-color .15s ease-in-out,box-shadow .15s ease-in-out;
        }
        /* تأثير عند تمرير الماوس فوق رابط نسيت كلمة السر */
        .forgot-password-link {
            color: #dc3545;
            transition: color 0.2s ease;
        }
        .forgot-password-link:hover {
            color: #a71d2a !important;
            text-decoration: underline !important;
        }
    </style>
</head>
<body class="bg-light">
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-4">
            <div class="card shadow p-4 border-0 rounded-4">
                <h3 class="text-center mb-4 fw-bold">تسجيل الدخول</h3>
                <form method="post">
                    {% csrf_token %}
                    
                    <div class="mb-3">
                        <label class="form-label">اسم المستخدم</label>
                        {{ form.username }}
                    </div>
                    
                    <div class="mb-3">
                        <label class="form-label">كلمة المرور</label>
                        {{ form.password }}
                        
                        <div class="text-end mt-2">
                            <a href="{% url 'password_reset' %}" class="text-decoration-none small fw-bold forgot-password-link">
                                🔒 نسيت كلمة السر؟
                            </a>
                        </div>
                    </div>
                    
                    <button type="submit" class="btn btn-primary w-100 py-2 rounded-3">دخول</button>
                </form>
                
                <div class="mt-3 text-center">
                    <small class="text-muted">ليس لديك حساب؟ <a href="#" class="text-decoration-none">سجل الآن</a></small>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
